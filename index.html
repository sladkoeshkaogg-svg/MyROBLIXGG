<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exiblox - Игровая Платформа</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --nav-bg: #1e1e1e;
            --accent: #00b0ff;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* Чтобы 3D холст не создавал прокрутку */
        }

        /* Окно авторизации (Модальное окно) */
        #auth-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-box {
            background: var(--nav-bg);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .auth-box input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: #333;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover { background-color: #0081cb; }

        /* Интерфейс платформы */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: none; /* Скрыто до авторизации */
        }

        /* Контейнер для 3D игры */
        #game-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="auth-modal">
        <div class="auth-box">
            <h2>Вход в аккаунт</h2>
            <p style="font-size: 12px; color: #aaa;">Данные будут сохраняться в облаке</p>
            <input type="text" id="username" placeholder="Имя пользователя">
            <input type="password" id="password" placeholder="Пароль">
            <button class="btn" onclick="login()">Войти / Играть</button>
        </div>
    </div>

    <div id="ui-layer">
        <h1 style="margin:0; text-shadow: 2px 2px 4px #000;">Exiblox Studio</h1>
        <p id="player-name" style="text-shadow: 1px 1px 2px #000;">Игрок: Гость</p>
        <button class="btn" onclick="addBlock()" style="width: auto;">+ Создать блок</button>
    </div>

    <div id="game-canvas"></div>

    <script>
        // --- ЧАСТЬ 1: ЛОГИКА АККАУНТОВ ---
        function login() {
            const user = document.getElementById('username').value;
            if (user.length < 3) {
                alert("Имя должно быть длиннее 3 символов!");
                return;
            }
            
            // Скрываем окно входа и показываем UI
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            document.getElementById('player-name').innerText = 'Игрок: ' + user;

            // Запускаем 3D движок!
            init3DEngine();
        }


        // --- ЧАСТЬ 2: 3D ДВИЖОК (Three.js) ---
        let scene, camera, renderer;

        function init3DEngine() {
            // 1. Создаем сцену
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Цвет неба

            // 2. Создаем камеру
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            camera.position.y = 2;

            // 3. Создаем рендерер (отрисовщик)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-canvas').appendChild(renderer.domElement);

            // 4. Добавляем землю (платформу)
            const floorGeo = new THREE.BoxGeometry(20, 1, 20);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0x228B22 }); // Зеленый цвет
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.position.y = -1;
            scene.add(floor);

            // 5. Запускаем цикл анимации
            animate();
        }

        // Функция для создания новых объектов в игре
        function addBlock() {
            if (!scene) return;
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            // Случайный цвет блока
            const material = new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff });
            const cube = new THREE.Mesh(geometry, material);
            
            // Случайная позиция
            cube.position.x = (Math.random() - 0.5) * 10;
            cube.position.z = (Math.random() - 0.5) * 10;
            cube.position.y = 1;
            
            scene.add(cube);
        }

        // Цикл отрисовки кадров
        function animate() {
            requestAnimationFrame(animate);
            // Здесь можно добавить вращение камеры или объектов
            renderer.render(scene, camera);
        }

        // Обновление размера окна при изменении
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
