<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Exiblox Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0b0b1a;color:#e2e8f0;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none;color:inherit}

.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(11,11,26,.97);backdrop-filter:blur(14px);height:54px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #252545;box-shadow:0 2px 20px rgba(0,0,0,.4)}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;color:#fff;cursor:pointer}
.logo-box{width:32px;height:32px;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#7c3aed,#ec4899)}
.logo-box img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.logo span{color:#a78bfa}
.search{flex:1;max-width:300px;margin:0 16px;position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:#64748b}
.search input{width:100%;padding:8px 12px 8px 30px;background:rgba(255,255,255,.07);border:1px solid #252545;border-radius:20px;color:#fff;font-size:12px;outline:none;transition:.2s}
.search input:focus{border-color:#7c3aed;background:rgba(124,58,237,.1)}
.hdr-btns{display:flex;gap:6px;margin-left:auto}
.hdr-btns button{height:32px;padding:0 12px;border-radius:16px;border:1px solid #252545;background:rgba(255,255,255,.06);color:#94a3b8;font-size:12px;font-weight:600;transition:.2s}
.hdr-btns button:hover{background:rgba(255,255,255,.12);color:#fff}
.btn-acc{background:linear-gradient(135deg,#7c3aed,#ec4899)!important;color:#fff!important;border-color:transparent!important}

.tabs{position:fixed;top:54px;left:0;right:0;z-index:99;background:#0e0e24;border-bottom:1px solid #252545;display:flex;overflow-x:auto;padding:0 12px;height:40px;align-items:center;gap:3px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 12px;font-size:11px;font-weight:600;color:#64748b;border-radius:20px;border:none;background:none;white-space:nowrap;transition:.2s}
.tab:hover{color:#fff;background:rgba(255,255,255,.06)}
.tab.on{color:#fff;background:#7c3aed;box-shadow:0 0 12px rgba(124,58,237,.4)}

.main{margin-top:94px;padding:16px;max-width:1200px;margin-left:auto;margin-right:auto}

/* HERO */
.hero{background:linear-gradient(135deg,#1e1145,#3b1578,#7c3aed);border-radius:16px;padding:26px;margin-bottom:20px;cursor:pointer;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='40' fill='none' stroke='rgba(255,255,255,0.04)' stroke-width='20'/%3E%3C/svg%3E") repeat;animation:bgSpin 30s linear infinite}
@keyframes bgSpin{to{background-position:100px 100px}}
.hero h2{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px;position:relative}
.hero p{font-size:12px;color:rgba(255,255,255,.75);margin-bottom:14px;position:relative}
.hero-btns{display:flex;gap:8px;position:relative}
.hero-btn{padding:9px 22px;background:#fff;color:#7c3aed;border:none;border-radius:20px;font-size:12px;font-weight:800;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.hero-btn2{padding:9px 22px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:20px;font-size:12px;font-weight:700;backdrop-filter:blur(4px)}

.section{margin-bottom:28px}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:16px;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px}
.sec-badge{font-size:9px;padding:2px 7px;background:rgba(124,58,237,.3);border:1px solid #7c3aed;border-radius:10px;color:#a78bfa}
.sec-more{font-size:11px;color:#a78bfa;border:none;background:none;font-weight:600}
.sec-more:hover{color:#c4b5fd}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stat-item{background:#151530;border:1px solid #252545;border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:20px;font-weight:900;color:#a78bfa}
.stat-label{font-size:10px;color:#64748b;margin-top:2px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.grid-lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}

.card{background:#151530;border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.04);transition:.22s}
.card:hover{border-color:#7c3aed;transform:translateY(-3px);box-shadow:0 8px 24px rgba(124,58,237,.2)}
.card:active{transform:scale(.97)}
.card-thumb{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:42px;position:relative}
.card-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.06),transparent 70%)}
.card-badge{position:absolute;top:5px;left:5px;padding:2px 7px;border-radius:10px;font-size:8px;font-weight:800;color:#fff;letter-spacing:.3px}
.b-hot{background:linear-gradient(90deg,#ef4444,#f97316)}.b-new{background:linear-gradient(90deg,#10b981,#06b6d4)}.b-top{background:linear-gradient(90deg,#f59e0b,#eab308)}.b-3d{background:linear-gradient(90deg,#06b6d4,#6366f1)}.b-ex{background:linear-gradient(90deg,#ec4899,#a855f7)}
.card-info{padding:10px}
.card-name{font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:9px;color:#64748b;margin-top:3px;display:flex;justify-content:space-between;align-items:center}
.card-meta b{color:#f59e0b}
.card-meta .plays{font-size:8px;color:#475569}

/* TG BANNER */
.tg-banner{background:linear-gradient(135deg,#0077b6,#00bbff);border-radius:12px;padding:18px;cursor:pointer;display:flex;align-items:center;gap:16px;margin-bottom:20px;transition:.2s;border:1px solid rgba(0,187,255,.3)}
.tg-banner:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,187,255,.2)}
.tg-icon{font-size:36px}
.tg-text h3{color:#fff;font-size:14px;font-weight:800;margin-bottom:3px}
.tg-text p{color:rgba(255,255,255,.8);font-size:11px}
.tg-arrow{margin-left:auto;font-size:20px;color:rgba(255,255,255,.6)}

/* HORIZONTAL SCROLL STRIP */
.hscroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.hcard{min-width:130px;background:#151530;border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.04);transition:.2s;flex-shrink:0}
.hcard:hover{border-color:#7c3aed;transform:translateY(-2px)}
.hcard-thumb{height:80px;display:flex;align-items:center;justify-content:center;font-size:32px}
.hcard-name{font-size:10px;font-weight:700;color:#fff;padding:6px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* GAME SCREEN */
.game-screen{position:fixed;inset:0;z-index:200;background:#000;display:none;flex-direction:column}
.game-screen.on{display:flex}
.gs-bar{height:42px;background:#0e0e24;display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:1px solid #252545}
.gs-back{padding:5px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:20px;color:#e2e8f0;font-size:11px;font-weight:700;transition:.2s}
.gs-back:hover{background:rgba(255,255,255,.15)}
.gs-name{font-size:12px;font-weight:700;color:#fff;flex:1}
.gs-score-wrap{display:flex;align-items:center;gap:4px;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.4);border-radius:12px;padding:3px 10px}
.gs-score-label{font-size:9px;color:#a78bfa}
.gs-score{font-size:13px;font-weight:900;color:#c4b5fd}
.gs-canvas-wrap{flex:1;position:relative;background:#080818;touch-action:none}
.gs-canvas-wrap canvas{width:100%;height:100%;display:block}

.game-over{position:absolute;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.game-over.on{display:flex}
.go-icon{font-size:48px;margin-bottom:8px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.game-over h2{color:#fff;font-size:22px;font-weight:900;margin-bottom:4px}
.go-lbl{font-size:12px;color:#64748b;margin-bottom:4px}
.go-sc{color:#a78bfa;font-size:40px;font-weight:900;margin-bottom:20px}
.go-btns{display:flex;gap:10px}
.go-retry{padding:11px 26px;background:#7c3aed;border:none;border-radius:20px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(124,58,237,.4)}
.go-exit{padding:11px 26px;background:rgba(239,68,68,.8);border:none;border-radius:20px;color:#fff;font-size:13px;font-weight:700}

/* MOBILE CONTROLS */
.mobile-pad{position:fixed;bottom:12px;left:12px;z-index:210;display:none}
.game-screen.on .mobile-pad{display:block}
.dpad{width:120px;height:120px;position:relative}
.dpad button{position:absolute;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center}
.dpad button:active{background:rgba(124,58,237,.5)}
.dpad .du{top:0;left:41px}.dpad .dd{bottom:0;left:41px}.dpad .dl{top:41px;left:0}.dpad .dr{top:41px;right:0}
.action-btns{position:fixed;bottom:20px;right:12px;z-index:210;display:none;gap:8px}
.game-screen.on .action-btns{display:flex}
.abtn{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.abtn:active{background:rgba(124,58,237,.5)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:150;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{background:#13132e;border:1px solid #252545;border-radius:16px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 24px 48px rgba(0,0,0,.6)}
.modal-top{aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;font-size:64px;position:relative}
.modal-top::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,#13132e)}
.modal-body{padding:18px}
.modal-body h2{font-size:19px;font-weight:900;color:#fff;margin-bottom:4px}
.modal-body p{font-size:12px;color:#64748b;margin-bottom:14px;line-height:1.5}
.modal-stats{display:flex;gap:16px;margin-bottom:14px}
.ms-item{text-align:center}
.ms-val{font-size:16px;font-weight:800;color:#a78bfa}
.ms-lbl{font-size:9px;color:#64748b}
.modal-play{width:100%;padding:11px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:800;margin-bottom:8px;box-shadow:0 4px 16px rgba(124,58,237,.3);transition:.2s}
.modal-play:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.4)}
.modal-row{display:flex;gap:8px}
.modal-fav{flex:1;padding:9px;background:rgba(255,255,255,.06);border:1px solid #252545;border-radius:10px;color:#64748b;font-size:12px;font-weight:600;transition:.2s}
.modal-fav.on{color:#ec4899;border-color:#ec4899;background:rgba(236,72,153,.1)}
.modal-share{flex:1;padding:9px;background:rgba(255,255,255,.06);border:1px solid #252545;border-radius:10px;color:#64748b;font-size:12px;font-weight:600}
.modal-close{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:14px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}

/* TOAST */
.toast-box{position:fixed;top:62px;right:12px;z-index:300}
.toast{padding:10px 16px;background:#1e1e3e;border:1px solid #352555;border-radius:12px;color:#fff;font-size:12px;margin-bottom:6px;animation:tIn .3s;box-shadow:0 4px 16px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px}
@keyframes tIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:none}}

/* SETTINGS */
.srow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #1a1a35}
.srow:last-child{border:none}
.slabel{font-size:13px;color:#fff;display:flex;align-items:center;gap:8px}
.slabel small{display:block;font-size:10px;color:#64748b;font-weight:400}
.stoggle{width:40px;height:22px;border-radius:11px;background:#252545;border:none;position:relative;transition:.3s}
.stoggle.on{background:linear-gradient(90deg,#7c3aed,#a855f7)}
.stoggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.stoggle.on::after{left:21px}
select.ssel{padding:5px 10px;background:#1a1a35;border:1px solid #252545;border-radius:8px;color:#fff;font-size:11px;outline:none}

/* PROFILE */
.profile-header{background:linear-gradient(135deg,#1e1145,#3b1578);border-radius:16px;padding:24px;margin-bottom:20px;text-align:center;position:relative;overflow:hidden}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#ec4899);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;border:3px solid rgba(255,255,255,.2);box-shadow:0 4px 20px rgba(124,58,237,.4)}
.profile-name{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px}
.profile-level{font-size:12px;color:#a78bfa;background:rgba(124,58,237,.25);border:1px solid rgba(124,58,237,.4);border-radius:12px;padding:3px 12px;display:inline-block;margin-bottom:12px}
.profile-xp-bar{height:8px;background:rgba(255,255,255,.1);border-radius:4px;margin:0 20px;overflow:hidden}
.profile-xp-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#ec4899);border-radius:4px;transition:width .8s ease}
.profile-xp-label{font-size:10px;color:rgba(255,255,255,.6);margin-top:5px}
.profile-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.ps-item{background:#151530;border:1px solid #252545;border-radius:10px;padding:12px 8px;text-align:center}
.ps-val{font-size:18px;font-weight:900;color:#a78bfa}
.ps-lbl{font-size:9px;color:#64748b;margin-top:2px}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.ach-item{background:#151530;border:1px solid #252545;border-radius:10px;padding:12px 8px;text-align:center;transition:.2s}
.ach-item.locked{opacity:.4;filter:grayscale(1)}
.ach-icon{font-size:24px;margin-bottom:4px}
.ach-name{font-size:9px;color:#94a3b8;font-weight:600}
.ach-desc{font-size:8px;color:#475569;margin-top:2px}

/* EMPTY */
.empty{text-align:center;padding:48px 0;color:#64748b}
.empty .eicon{font-size:52px;margin-bottom:10px;display:block}
.empty p{font-size:13px}

/* AI PANEL */
.ai-btn{position:fixed;bottom:16px;right:16px;z-index:140;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#ec4899);border:none;color:#fff;font-size:22px;box-shadow:0 4px 20px rgba(124,58,237,.5);transition:.2s}
.ai-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(124,58,237,.6)}
.ai-panel{position:fixed;bottom:76px;right:12px;z-index:141;width:290px;max-height:380px;background:#13132e;border:1px solid #252545;border-radius:16px;display:none;flex-direction:column;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.5)}
.ai-panel.on{display:flex}
.ai-head{padding:12px 14px;border-bottom:1px solid #252545;font-size:13px;font-weight:800;color:#fff;display:flex;justify-content:space-between;align-items:center;background:rgba(124,58,237,.1)}
.ai-msgs{flex:1;overflow-y:auto;padding:10px;min-height:160px;display:flex;flex-direction:column;gap:6px}
.ai-msg{padding:8px 12px;border-radius:12px;font-size:11px;max-width:85%;line-height:1.5}
.ai-bot{background:#1a1a3e;color:#e2e8f0;align-self:flex-start;border:1px solid #252545}
.ai-usr{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;align-self:flex-end}
.ai-inp-wrap{display:flex;gap:6px;padding:10px;border-top:1px solid #252545}
.ai-inp-wrap input{flex:1;padding:7px 12px;background:rgba(255,255,255,.06);border:1px solid #252545;border-radius:20px;color:#fff;font-size:11px;outline:none}
.ai-inp-wrap input:focus{border-color:#7c3aed}
.ai-inp-wrap button{padding:7px 14px;background:linear-gradient(135deg,#7c3aed,#a855f7);border:none;border-radius:20px;color:#fff;font-size:12px;font-weight:700}

@media(min-width:600px){.mobile-pad,.action-btns{display:none!important}}
@media(max-width:500px){.grid{grid-template-columns:repeat(2,1fr);gap:8px}.logo span{display:none}.search{max-width:130px}.stats-bar{grid-template-columns:repeat(3,1fr)}.profile-stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo" onclick="showPage('home')">
    <div class="logo-box">
      <img src="icon.png" alt="E" onerror="this.style.display='none';this.parentNode.innerHTML='<span style=\'font-size:18px;font-weight:900;color:#fff\'>E</span>'">
    </div>
    Exiblox <span>Games</span>
  </div>
  <div class="search">
    <span class="search-icon">🔍</span>
    <input id="searchInp" placeholder="Поиск игр..." oninput="doSearch(this.value)">
  </div>
  <div class="hdr-btns">
    <button onclick="showPage('profile')" title="Профиль">👤</button>
    <button onclick="showToast('🔔 Нет новых уведомлений')">🔔</button>
    <button class="btn-acc" id="accBtn" onclick="toggleAccount()">Войти</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs"></div>

<!-- MAIN -->
<div class="main" id="main"></div>

<!-- GAME MODAL -->
<div class="overlay" id="gameModal" onclick="if(event.target===this)this.classList.remove('on')">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="document.getElementById('gameModal').classList.remove('on')">✕</button>
    <div class="modal-top" id="gmTop"></div>
    <div class="modal-body">
      <h2 id="gmName"></h2>
      <p id="gmDesc"></p>
      <div class="modal-stats">
        <div class="ms-item"><div class="ms-val" id="gmRating">4.5</div><div class="ms-lbl">★ Рейтинг</div></div>
        <div class="ms-item"><div class="ms-val" id="gmPlayers">10K</div><div class="ms-lbl">Игроков</div></div>
        <div class="ms-item"><div class="ms-val" id="gmHS">0</div><div class="ms-lbl">Рекорд</div></div>
      </div>
      <button class="modal-play" id="gmPlayBtn">▶ Играть сейчас</button>
      <div class="modal-row">
        <button class="modal-fav" id="gmFavBtn" onclick="toggleFav()">♥ Избранное</button>
        <button class="modal-share" onclick="shareGame()">↗ Поделиться</button>
      </div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="game-screen" id="gameScreen">
  <div class="gs-bar">
    <button class="gs-back" onclick="exitGame()">← Выход</button>
    <span class="gs-name" id="gsName"></span>
    <div class="gs-score-wrap">
      <span class="gs-score-label">ОЧКИ</span>
      <span class="gs-score" id="gsScoreDisplay">0</span>
    </div>
  </div>
  <div class="gs-canvas-wrap" id="gsWrap">
    <canvas id="gameCanvas"></canvas>
    <div class="game-over" id="gameOver">
      <div class="go-icon">🏁</div>
      <h2>Игра окончена!</h2>
      <div class="go-lbl">Ваш результат</div>
      <div class="go-sc" id="goScore">0</div>
      <div class="go-btns">
        <button class="go-retry" onclick="restartCurrentGame()">🔄 Заново</button>
        <button class="go-exit" onclick="exitGame()">✕ Выход</button>
      </div>
    </div>
  </div>
  <div class="mobile-pad"><div class="dpad">

function makeCard(g){
  var bh='';
  if(g.badge==='hot') bh='<div class="card-badge b-hot">🔥 Хит</div>';
  else if(g.badge==='new') bh='<div class="card-badge b-new">✨ Ново</div>';
  else if(g.badge==='top') bh='<div class="card-badge b-top">👑 Топ</div>';
  else if(g.badge==='3d') bh='<div class="card-badge b-3d">3D</div>';
  else if(g.badge==='ex') bh='<div class="card-badge b-ex">💎 EX</div>';
  return '<div class="card" onclick="openModal('+g.id+')">'
    +'<div class="card-thumb" style="background:'+g.color+'"><div class="card-glow"></div>'+bh+'<span>'+g.icon+'</span></div>'
    +'<div class="card-info"><div class="card-name">'+g.name+'</div>'
    +'<div class="card-meta"><b>★'+g.rating+'</b><span class="plays">👤 '+g.players+'</span></div></div></div>';
}

function makeGrid(list){
  if(!list.length) return '<div class="empty"><span class="eicon">🎮</span><p>Игры не найдены</p></div>';
  var h='<div class="grid">';for(var i=0;i<list.length;i++)h+=makeCard(list[i]);return h+'</div>';
}

// ===== GAME LAUNCH =====
function launchGame(id){
  var g=GAMES.find(function(x){return x.id===id});
  if(!g)return;
  curGameObj=g;gameScore=0;
  recs=recs.filter(function(x){return x!==id});recs.unshift(id);if(recs.length>20)recs.pop();
  localStorage.setItem('xr',JSON.stringify(recs));
  gamesPlayed++;localStorage.setItem('xgp',gamesPlayed);
  userXP+=20;localStorage.setItem('xxp',userXP);
  document.getElementById('gsName').textContent=g.name;
  document.getElementById('gsScoreDisplay').textContent='0';
  document.getElementById('gameOver').classList.remove('on');
  document.getElementById('gameScreen').classList.add('on');
  setTimeout(function(){startEngine(g.eng)},80);
}

function exitGame(){
  if(gameAnimId){cancelAnimationFrame(gameAnimId);gameAnimId=null}
  document.getElementById('gameScreen').classList.remove('on');
}

function restartCurrentGame(){
  document.getElementById('gameOver').classList.remove('on');
  gameScore=0;document.getElementById('gsScoreDisplay').textContent='0';
  if(curGameObj)startEngine(curGameObj.eng);
}

function updScore(){
  document.getElementById('gsScoreDisplay').textContent=gameScore;
  if(curGameObj&&(!highScores[curGameObj.eng]||gameScore>highScores[curGameObj.eng])){
    highScores[curGameObj.eng]=gameScore;
    localStorage.setItem('xhs',JSON.stringify(highScores));
  }
}

function gameOverScreen(){
  document.getElementById('goScore').textContent=gameScore;
  document.getElementById('gameOver').classList.add('on');
  if(gameAnimId){cancelAnimationFrame(gameAnimId);gameAnimId=null}
  var bonus=Math.floor(gameScore/10);userXP+=bonus;
  localStorage.setItem('xxp',userXP);
  if(bonus>0)setTimeout(function(){showToast('⚡ +'+bonus+' XP заработано!')},600);
}

// ===== ALL GAME ENGINES =====
function startEngine(eng){
  var canvas=document.getElementById('gameCanvas');
  var wrap=document.getElementById('gsWrap');
  canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;
  var c=canvas.getContext('2d');
  var W=canvas.width,H=canvas.height;
  if(gameAnimId){cancelAnimationFrame(gameAnimId);gameAnimId=null}
  canvas.onclick=null;canvas.onmousemove=null;
  gameScore=0;

  // ===== SNAKE =====
  if(eng==='snake'){
    var sz=Math.max(12,Math.floor(Math.min(W,H)/28));
    var cols=Math.floor(W/sz),rows=Math.floor(H/sz);
    var sn=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];
    var dir={x:1,y:0},food={x:5,y:5},fr=0,spd=7,alive=true;
    food={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)};
    function loop(){
      if(!alive)return;gameAnimId=requestAnimationFrame(loop);fr++;
      var I=inp();
      if(I.u&&dir.y!==1)dir={x:0,y:-1};if(I.d&&dir.y!==-1)dir={x:0,y:1};
      if(I.l&&dir.x!==1)dir={x:-1,y:0};if(I.r&&dir.x!==-1)dir={x:1,y:0};
      if(fr%Math.max(2,Math.floor(60/spd))!==0)return;
      var hd={x:sn[0].x+dir.x,y:sn[0].y+dir.y};
      if(hd.x<0||hd.x>=cols||hd.y<0||hd.y>=rows){alive=false;gameOverScreen();return}
      for(var i=0;i<sn.length;i++){if(sn[i].x===hd.x&&sn[i].y===hd.y){alive=false;gameOverScreen();return}}
      sn.unshift(hd);
      if(hd.x===food.x&&hd.y===food.y){gameScore+=10;updScore();food={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)};if(spd<18)spd+=0.4}
      else sn.pop();
      c.fillStyle='#0a0a18';c.fillRect(0,0,W,H);
      c.fillStyle='#ef4444';c.beginPath();c.arc(food.x*sz+sz/2,food.y*sz+sz/2,sz/2-1,0,Math.PI*2);c.fill();
      for(var i=0;i<sn.length;i++){c.fillStyle='hsl('+(140+i*3)+',80%,'+(50-i*0.3)+'%)';c.fillRect(sn[i].x*sz+1,sn[i].y*sz+1,sz-2,sz-2)}
    }
    loop();
  }
  // ===== SHOOTER =====
  else if(eng==='shooter'){
    var px=W/2,py=H-50,bul=[],en=[],st=0,alive=true;
    function loop(){
      if(!alive)return;gameAnimId=requestAnimationFrame(loop);
      var I=inp();
      if(I.l)px=Math.max(14,px-5);if(I.r)px=Math.min(W-14,px+5);
      if(I.u)py=Math.max(14,py-4);if(I.d)py=Math.min(H-14,py+4);
      if(I.a&&bul.length<8){if(!kkeys._sc||kkeys._sc<=0){bul.push({x:px,y:py-12});kkeys._sc=8}}
      if(kkeys._sc>0)kkeys._sc--;
      st++;if(st>30){st=0;en.push({x:Math.random()*(W-30)+15,y:-18,dy:1.5+Math.random()*2.5,sz:12+Math.random()*10})}
      for(var i=0;i<en.length;i++)en[i].y+=en[i].dy;
      en=en.filter(function(e){return e.y<H+30});
      for(var i=0;i<bul.length;i++)bul[i].y-=8;
      bul=bul.filter(function(b){return b.y>-10});
      for(var i=bul.length-1;i>=0;i--){for(var j=en.length-1;j>=0;j--){if(Math.abs(bul[i].x-en[j].x)<en[j].sz&&Math.abs(bul[i].y-en[j].y)<en[j].sz){en.splice(j,1);bul.splice(i,1);gameScore+=25;updScore();break}}}
      for(var i=0;i<en.length;i++){if(Math.abs(en[i].x-px)<en[i].sz+8&&Math.abs(en[i].y-py)<en[i].sz+8){alive=false;gameOverScreen();return}}
      c.fillStyle='#0a0a18';c.fillRect(0,0,W,H);
      for(var i=0;i<30;i++){c.fillStyle='rgba(255,255,255,'+Math.random()*0.2+')';c.fillRect(Math.random()*W,Math.random()*H,1,1)}
      c.fillStyle='#3b82f6';c.beginPath();c.moveTo(px,py-14);c.lineTo(px-11,py+9);c.lineTo(px+11,py+9);c.closePath();c.fill();
      c.fillStyle='#fbbf24';for(var i=0;i<bul.length;i++){c.beginPath();c.arc(bul[i].x,bul[i].y,3,0,Math.PI*2);c.fill()}
      c.fillStyle='#ef4444';for(var i=0;i<en.length;i++){c.beginPath();c.arc(en[i].x,en[i].y,en[i].sz,0,Math.PI*2);c.fill()}
    }
    loop();
  }
  // ===== FLAPPY =====
  else if(eng==='flappy'){
    var by=H/2,bv=0,pipes=[],fr=0,alive=true,started=false;
    var gap=130,pw=45;
    canvas.onclick=function(){if(!started)started=true;if(alive)bv=-6.5};
    function loop(){
      gameAnimId=requestAnimationFrame(loop);
      c.fillStyle='#064e3b';c.fillRect(0,0,W,H);
      if(!started){c.fillStyle='rgba(255,255,255,.9)';c.font='bold 16px sans-serif';c.textAlign='center';c.fillText('Нажмите чтобы начать!',W/2,H/2);c.textAlign='left';return}
      if(!alive)return;
      var I=inp();if(I.a){bv=-6.5;kkeys.Space=false;mkeys.a=false}
      bv+=0.35;by+=bv;fr++;
      if(fr%75===0)pipes.push({x:W,gy:70+Math.random()*(H-200),scored:false});
      for(var i=0;i<pipes.length;i++){pipes[i].x-=3;if(!pipes[i].scored&&pipes[i].x+pw<W/3){pipes[i].scored=true;gameScore++;updScore()}}
      pipes=pipes.filter(function(p){return p.x>-pw});
      if(by<0||by>H){alive=false;gameOverScreen();return}
      for(var i=0;i<pipes.length;i++){var p=pipes[i];if(W/3+10>p.x&&W/3-10<p.x+pw){if(by-10<p.gy||by+10>p.gy+gap){alive=false;gameOverScreen();return}}}
      for(var i=0;i<pipes.length;i++){var p=pipes[i];c.fillStyle='#22c55e';c.fillRect(p.x,0,pw,p.gy);c.fillRect(p.x,p.gy+gap,pw,H);c.fillStyle='#16a34a';c.fillRect(p.x-3,p.gy-14,pw+6,14);c.fillRect(p.x-3,p.gy+gap,pw+6,14)}
      c.fillStyle='#fbbf24';c.beginPath();c.arc(W/3,by,12,0,Math.PI*2);c.fill();
      c.fillStyle='#fff';c.beginPath();c.arc(W/3+3,by-3,3,0,Math.PI*2);c.fill();
    }
    loop();
  }
  // ===== PONG =====
  else if(eng==='pong'){
    var ph=H/5,p1=H/2-ph/2,p2=H/2-ph/2,bx=W/2,by2=H/2,bdx=4,bdy=3;
    canvas.onmousemove=function(e){var r=canvas.getBoundingClientRect();p1=e.clientY-r.top-ph/2};
    function loop(){
      gameAnimId=requestAnimationFrame(loop);
      var I=inp();if(I.u)p1-=5;if(I.d)p1+=5;
      p1=Math.max(0,Math.min(H-ph,p1));
      if(by2<p2+ph/2)p2-=3;else p2+=3;p2=Math.max(0,Math.min(H-ph,p2));
      bx+=bdx;by2+=bdy;if(by2<=0||by2>=H)bdy*=-1;
      if(bx<=24&&by2>=p1&&by2<=p1+ph){bdx=Math.abs(bdx);bdy+=(by2-(p1+ph/2))/12;gameScore++;updScore()}
      if(bx>=W-24&&by2>=p2&&by2<=p2+ph)bdx=-Math.abs(bdx);
      if(bx<0||bx>W){bx=W/2;by2=H/2;bdx=4*(Math.random()>.5?1:-1);bdy=3*(Math.random()>.5?1:-1)}
      c.fillStyle='#0a0a18';c.fillRect(0,0,W,H);
      c.setLineDash([8,8]);c.strokeStyle='rgba(255,255,255,.1)';c.beginPath();c.moveTo(W/2,0);c.lineTo(W/2,H);c.stroke();c.setLineDash([]);
      c.fillStyle='#7c3aed';c.fillRect(8,p1,10,ph);
      c.fillStyle='#ef4444';c.fillRect(W-18,p2,10,ph);
      c.fillStyle='#fff';c.beginPath();c.arc(bx,by2,6,0,Math.PI*2);c.fill();
    }
    loop();
  }
  // ===== TETRIS =====
  else if(eng==='tetris'){
    var co=10,ro=20,bs=Math.min(Math.floor(W/12),Math.floor(H/22));
    var ox=Math.floor((W-co*bs)/2),oy=Math.floor((H-ro*bs)/2);

      c.fillStyle='#22c55e';for(var i=0;i<dots.length;i++){c.beginPath();c.arc(dots[i].x,dots[i].y,8,0,Math.PI*2);c.fill()}
      c.fillStyle='#7c3aed';c.beginPath();c.arc(dpx,dpy,10,0,Math.PI*2);c.fill();
    }
    loop();
  }
}

// ===== AI CHAT =====
var aiOpen=false;
function toggleAI(){aiOpen=!aiOpen;document.getElementById('aiPanel').classList.toggle('on');
  if(aiOpen&&!document.getElementById('aiMsgs').innerHTML)addAI('bot','Привет! Я Exiblox AI 🤖\nСпроси о любой игре или попроси рекомендацию!')}
function addAI(who,txt){var d=document.createElement('div');d.className='ai-msg '+(who==='bot'?'ai-bot':'ai-usr');d.textContent=txt;document.getElementById('aiMsgs').appendChild(d);d.scrollIntoView()}
function sendAI(){
  var inp2=document.getElementById('aiInput');var v=inp2.value.trim();if(!v)return;
  addAI('usr',v);inp2.value='';
  setTimeout(function(){
    var q=v.toLowerCase();
    var found=null;for(var i=0;i<GAMES.length;i++){if(GAMES[i].name.toLowerCase().indexOf(q)>=0){found=GAMES[i];break}}
    var ans;
    if(found)ans='Нашёл! "'+found.name+'" — '+found.desc+' Рейтинг: ★'+found.rating;
    else if(q.indexOf('3d')>=0)ans='У нас есть 3D игры: 3D Раннер и 3D Космос! Попробуй их!';
    else if(q.indexOf('нов')>=0||q.indexOf('new')>=0)ans='Новые игры: Удар по Кроту, Пакмен, Захватчики, Гравитация, Рыбалка, Лезвие, Волейбол и другие!';
    else if(q.indexOf('прос')>=0||q.indexOf('легк')>=0)ans='Простые игры: Крестики-Нолики, Память, Поймай Звёзды. Начни с них!';
    else if(q.indexOf('сложн')>=0||q.indexOf('hard')>=0)ans='Сложные: Лезвие, Захватчики, Пакмен, 3D Раннер. Готовься!';
    else if(q.indexOf('помо')>=0||q.indexOf('help')>=0)ans='Используй стрелки или D-pad. Пробел — прыжок/стрельба. Кликай в играх на клик!';
    else if(q.indexOf('лучш')>=0||q.indexOf('топ')>=0)ans='Топ игры: Тетрис ★4.9, 2048 ★4.8, Шутер ★4.8, Пакмен ★4.8! Все горячие хиты!';
    else if(q.indexOf('рекоменд')>=0||q.indexOf('посовет')>=0)ans='Рекомендую: Змейка Неон, Тетрис, Пакмен или 3D Космос. Отличные игры!';
    else if(q.indexOf('профил')>=0)ans='Профиль хранит твой прогресс, уровень, XP и рекорды. Войди в аккаунт чтобы увидеть!';
    else ans='Попробуй поиск по названию! У нас '+GAMES.length+' игр. Пиши что ищешь — помогу найти!';
    addAI('bot',ans);
  },500);
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')exitGame()});
