  for(var i=0;i<dots.length;i++)if(Math.sqrt(Math.pow(dots[i].x-dpx,2)+Math.pow(dots[i].y-dpy,2))<18){dots[i].x=Math.random()*W;dots[i].y=Math.random()*H;gameScore+=10;updScore()}
  c.fillStyle='#0a0a18';c.fillRect(0,0,W,H);
  c.fillStyle='#22c55e';for(var i=0;i<dots.length;i++){c.beginPath();c.arc(dots[i].x,dots[i].y,8,0,Math.PI*2);c.fill()}
  c.fillStyle='#7c3aed';c.beginPath();c.arc(dpx,dpy,10,0,Math.PI*2);c.fill();
 }();
}
} /* end startEngine */

/* ===== AI CHAT ===== */
var aiOpen=false;
function toggleAI(){aiOpen=!aiOpen;document.getElementById('aiPanel').classList.toggle('on');
 if(aiOpen&&!document.getElementById('aiMsgs').innerHTML)addAI('bot','Привет! Я Exiblox AI 🤖\nСпроси о любой игре или попроси рекомендацию!')}
function addAI(who,txt){var d=document.createElement('div');d.className='ai-msg '+(who==='bot'?'ai-bot':'ai-usr');d.textContent=txt;document.getElementById('aiMsgs').appendChild(d);d.scrollIntoView()}
function sendAI(){
 var inp2=document.getElementById('aiInput'),v=inp2.value.trim();if(!v)return;addAI('usr',v);inp2.value='';
 setTimeout(function(){var q=v.toLowerCase(),found=null;
  for(var i=0;i<GAMES.length;i++)if(GAMES[i].name.toLowerCase().indexOf(q)>=0){found=GAMES[i];break}
  var ans;
  if(found)ans='Нашёл! "'+found.name+'" — '+found.desc+' ★'+found.rating;
  else if(q.indexOf('тем')>=0)ans='У нас 10 тем! Зайди в ⚙️ Настройки и выбери: Тёмная, Светлая, AMOLED, Неон, Ретро, Океан, Лес, Закат, Кибер, Снег!';
  else if(q.indexOf('нов')>=0)ans='Новые v3: Башня, Ножи, Пузыри, Лазеры, Мяч Прыгун, Метеоры, Цветной Поток, Рефлекс, Орбита, Минёр!';
  else if(q.indexOf('прос')>=0||q.indexOf('легк')>=0)ans='Простые: Крестики-Нолики, Память, Поймай Звёзды, Пузыри!';
  else if(q.indexOf('сложн')>=0)ans='Сложные: Лезвие, Захватчики, Пакмен, Лазеры, Минёр!';
  else if(q.indexOf('лучш')>=0||q.indexOf('топ')>=0)ans='Топ: Тетрис ★4.9, 2048 ★4.8, Шутер ★4.8, Пакмен ★4.8!';
  else if(q.indexOf('рекоменд')>=0)ans='Рекомендую: Башня (стакинг), Ножи (точность), Орбита (ритм)!';
  else if(q.indexOf('помо')>=0)ans='Стрелки/WASD — движение. Пробел — действие. Мышь — в играх с кликом!';
  else if(q.indexOf('стрик')>=0||q.indexOf('streak')>=0)ans='Заходи каждый день чтобы увеличить стрик! Сейчас: 🔥'+streak+' дней!';
  else ans='У нас '+GAMES.length+' игр! Напиши название или спроси "новые", "сложные", "темы"!';
  addAI('bot',ans);
 },500);
}
